<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
</head>
<body>

    <script>

        var mes = 10; 

        document.write("Mês antes da função: " + mes + "<br>");

        function teste() {
           var mes = 12;
           document.write("Mês dentro da função: " + mes + "<br>");
        }

        teste();

        document.write("Mês depois da função: " + mes + "<br>");

        
    </script>
    
</body>
</html>
